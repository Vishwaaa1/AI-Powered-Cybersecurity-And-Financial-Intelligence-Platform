<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CyberNest | Settings</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        if (localStorage.getItem('theme') === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
        } else {
            document.documentElement.classList.remove('dark');
        }
    </script>
</head>
<body class="bg-gray-100 dark:bg-gray-900 dark:text-gray-200 font-sans">
    <div class="flex min-h-screen">
        <aside class="w-60 bg-white dark:bg-gray-800 shadow-md p-6">
            <h1 class="text-2xl font-bold text-blue-700 dark:text-blue-400 mb-8">CyberNest</h1>
            <nav class="space-y-4">
                <a href="/dashboard" class="block text-gray-700 dark:text-gray-300 hover:text-blue-500">Dashboard</a>
                <a href="/budgets" class="block text-gray-700 dark:text-gray-300 hover:text-blue-500">Budgets</a>
                <a href="/assistant" class="block text-gray-700 dark:text-gray-300 hover:text-blue-500">AI Advisor</a>
                <a href="/memory" class="block text-gray-700 dark:text-gray-300 hover:text-blue-500">Vendor Memory</a>
                <a href="/settings" class="block font-semibold text-blue-700 dark:text-blue-400">Settings</a>
                <a href="/bill-splitter" class="block text-gray-700 dark:text-gray-300 hover:text-blue-500">Bill Splitter</a>
                <a href="/" class="block text-gray-700 dark:text-gray-300 hover:text-blue-500 dark:hover:text-blue-400">Navigator Home</a>
            </nav>
        </aside>

        <main class="flex-1 p-8">
            <h2 class="text-2xl font-semibold mb-6">Settings</h2>

            <div class="space-y-8 max-w-2xl">
                <div class="bg-white dark:bg-gray-800 p-6 rounded-lg shadow border dark:border-gray-700">
                    <h3 class="text-lg font-medium mb-4">Appearance</h3>
                    <div class="flex items-center justify-between">
                        <span class="text-gray-700 dark:text-gray-300">Dark Mode</span>
                        <button id="theme-toggle" type="button" class="relative inline-flex h-6 w-11 flex-shrink-0 cursor-pointer rounded-full border-2 border-transparent bg-gray-200 dark:bg-gray-600 transition-colors duration-200 ease-in-out focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:ring-offset-2" role="switch" aria-checked="false">
                            <span class="sr-only">Use setting</span>
                            <span id="theme-toggle-knob" class="pointer-events-none inline-block h-5 w-5 transform rounded-full bg-white shadow ring-0 transition duration-200 ease-in-out translate-x-0 dark:translate-x-5"></span>
                        </button>
                    </div>
                </div>

                <div class="bg-white dark:bg-gray-800 p-6 rounded-lg shadow border border-red-300 dark:border-red-700">
                    <h3 class="text-lg font-medium mb-2 text-red-600 dark:text-red-400">Danger Zone</h3>
                    <div class="flex items-center justify-between">
                        <div>
                            <p class="font-medium">Clear Vendor Memory</p>
                            <p class="text-sm text-gray-500 dark:text-gray-400">This will permanently delete all your saved vendor names and categories. This action cannot be undone.</p>
                        </div>
                        <button id="clear-memory-btn" class="bg-red-600 hover:bg-red-700 text-white font-bold py-2 px-4 rounded-md transition-colors">
                            Clear Memory
                        </button>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="/scripts/settings.js"></script>
</body>
</html>
