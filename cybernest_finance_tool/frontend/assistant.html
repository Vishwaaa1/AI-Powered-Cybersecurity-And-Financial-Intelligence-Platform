<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Smart Assistant | CyberNest</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="/static/assistant.css" />
    <script>
        const savedTheme = localStorage.getItem('theme');
        if (savedTheme === 'dark') {
            document.documentElement.classList.add('dark');
        } else if (savedTheme === 'light') {
             document.documentElement.classList.remove('dark');
        } else {
            if (window.matchMedia('(prefers-color-scheme: dark)').matches) {
                document.documentElement.classList.add('dark');
            } else {
                 document.documentElement.classList.remove('dark');
            }
        }
    </script>
    <style>
         .dark body { background-color: #111827; }
         .dark aside { background-color: #1f2937; }
         .dark h1, .dark h2, .dark p, .dark .category-btn, .dark .suggest-btn { color: #d1d5db; }
         .dark .category-btn { background-color: #374151; color: #d1d5db;}
         .dark .category-btn.active { background-color: #4F46E5 !important; color: white !important;}
         .dark .suggest-btn { background-color: #374151; }
         .dark .suggest-btn:hover { background-color: #4b5563; }
         .dark .chat-message.bot-message { background-color: #374151; color: #f3f4f6; border-color: #4b5563; }
         .dark .chat-message.user-message { background-color: #4F46E5; }
         .dark #chat-form { border-color: #374151; }
         .dark #user-input { background-color: #1f2937; color: #d1d5db; }
         .dark .ai-avatar { background-color: #4338ca; }
         .dark .typing-indicator span { background-color: #718096; }
    </style>
</head>
<body class="bg-gray-100 dark:bg-gray-900 dark:text-gray-200 font-sans transition-colors duration-300">
    <div class="flex h-screen overflow-hidden">
        <aside class="w-60 bg-white dark:bg-gray-800 shadow-md p-6 flex-shrink-0">
            <h1 class="text-2xl font-bold text-blue-700 dark:text-blue-400 mb-8">CyberNest</h1>
            <nav class="space-y-4">
                <a href="/dashboard" class="block text-gray-700 dark:text-gray-300 hover:text-blue-500 dark:hover:text-blue-400">Dashboard</a>
                <a href="/budgets" class="block text-gray-700 dark:text-gray-300 hover:text-blue-500 dark:hover:text-blue-400">Budgets</a>
                <a href="/assistant" class="block font-semibold text-blue-700 dark:text-blue-400">AI Advisor</a>
                <a href="/memory" class="block text-gray-700 dark:text-gray-300 hover:text-blue-500 dark:hover:text-blue-400">Vendor Memory</a>
                <a href="/settings" class="block text-gray-700 dark:text-gray-300 hover:text-blue-500 dark:hover:text-blue-400">Settings</a>
                <a href="/bill-splitter" class="block text-gray-700 dark:text-gray-300 hover:text-blue-500 dark:hover:text-blue-400">Bill Splitter</a>
                <a href="/" class="block text-gray-700 dark:text-gray-300 hover:text-blue-500 dark:hover:text-blue-400">Navigator Home</a>
            </nav>
        </aside>

        <main class="flex-1 p-6 overflow-y-auto">
            <h1 class="text-2xl font-bold mb-4 flex items-center gap-2 dark:text-white">
                🧠 AI Financial Assistant
            </h1>
            <p class="text-sm mb-6 text-gray-600 dark:text-gray-400">
                Get intelligent insights about your finances
            </p>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div>
                    <h2 class="text-lg font-semibold mb-2 dark:text-white">Ask About Your Finances</h2>
                    <p class="text-sm mb-2 text-gray-600 dark:text-gray-400">Choose a category or ask any question</p>
                    <div class="flex flex-wrap gap-2 mb-4">
                        
                        <button class="category-btn active px-2 py-1 rounded" data-target="spending-group">🕓 Spending Analysis</button>
                        <button class="category-btn px-2 py-1 rounded" data-target="goals-group">💡 Savings & Goals</button>
                        <button class="category-btn px-2 py-1 rounded" data-target="tips-group">📋 Financial Tips</button>
                        <button class="category-btn px-2 py-1 rounded" data-target="budget-group">📁 Budget Planning</button>
                    </div>

                    
                    <div id="spending-group" class="suggestions-group space-y-2">
                        <button class="suggest-btn">How much did I spend last month?</button>
                        <button class="suggest-btn">What's my biggest expense category?</button>
                        <button class="suggest-btn">Show me my spending trends</button>
                        <button class="suggest-btn">How much do I spend on groceries monthly?</button>
                        <button class="suggest-btn">Compare my current spending to last month</button>
                    </div>
                    <div id="goals-group" class="suggestions-group space-y-2 hidden">
                        <button class="suggest-btn">How much should I save monthly?</button>
                        <button class="suggest-btn">Am I on track for my savings goal?</button>
                        <button class="suggest-btn">How can I save more?</button>
                    </div>
                    <div id="tips-group" class="suggestions-group space-y-2 hidden">
                        <button class="suggest-btn">Give me tips to reduce monthly spending</button>
                        <button class="suggest-btn">How can I improve my financial habits?</button>
                    </div>
                    <div id="budget-group" class="suggestions-group space-y-2 hidden">
                        <button class="suggest-btn">Help me build a monthly budget</button>
                        <button class="suggest-btn">Am I overspending in any area?</button>
                    </div>
                </div>

                <div class="bg-white dark:bg-gray-800 rounded shadow flex flex-col h-[550px]">
                    <div id="chat-box" class="flex-1 overflow-auto p-4 space-y-2 text-sm"></div>
                    <form id="chat-form" class="flex border-t dark:border-gray-700">
                        <input type="text" id="user-input" placeholder="Ask me anything..." class="flex-1 px-4 py-2 focus:outline-none dark:bg-gray-700 dark:text-gray-200"/>
                        <button type="submit" id="send-btn" class="bg-indigo-600 hover:bg-indigo-700 text-white px-4 py-2 flex items-center justify-center w-14 transition-colors">
                            <svg id="send-icon" class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"></path></svg>
                            <svg id="loader-icon" class="w-5 h-5 loader hidden" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h5M20 20v-5h-5"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 9a9 9 0 0114.234-5.323m1.44-2.673A9 9 0 0115 20"></path></svg>
                        </button>
                    </form>
                </div>
            </div>
        </main>
    </div>
    <script src="/scripts/assistant.js"></script>
</body>
</html>
