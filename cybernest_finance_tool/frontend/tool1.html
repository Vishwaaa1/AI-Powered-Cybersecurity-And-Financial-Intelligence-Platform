<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>CyberNest - URL Threat Detector</title>
     <meta name="viewport" content="width=device-width, initial-scale=1.0"> {/* Added viewport */}
     <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600&display=swap" rel="stylesheet">
    <style>
        :root{
             --bg:#05080f; --panel:rgba(18, 25, 49, 0.8);
             --accent:#00f0ff; --accent-2:#b84eff; --text:#e9ecf1;
             --muted:#aab3c7; --danger:#ff788a; --ok:#6ef0a6;
             --mono:"SFMono-Regular",Consolas,Monaco,Menlo,monospace;
             --sans: 'Orbitron', ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica;
        }
        *{box-sizing:border-box}
        html, body { height: 100%; margin: 0; }
        body {
            font-family: var(--sans); background: var(--bg); color: var(--text);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            min-height: 100vh;
            padding-top: 70px; /* Space for fixed nav */
            position: relative; overflow: hidden;
        }
        .nav-back {
            position: fixed; top: 0; left: 0; width: 100%; padding: 15px 30px;
            background: rgba(11, 16, 32, 0.8); border-bottom: 1px solid rgba(0, 240, 255, 0.1);
            backdrop-filter: blur(5px); z-index: 100;
        }
        .nav-back a { color: var(--accent); text-decoration: none; font-weight: bold; }
        .nav-back a:hover { color: var(--accent-2); text-decoration: underline; }

        .container {
            background: var(--panel); border: 1px solid rgba(0, 240, 255, 0.1); border-radius: 18px;
            box-shadow: 0 8px 32px 0 rgba(0, 240, 255, 0.1); backdrop-filter: blur(10px);
            padding: 40px 32px 32px 32px; max-width: 500px; width: 90%;
            margin: 0 auto; /* Centering with auto margins */
            display: flex; flex-direction: column; align-items: center;
            position: relative; z-index: 1; /* Above particles */
        }
        h1 { /* Keep existing h1 styles */
            margin-bottom: 24px; color: var(--accent);
            text-shadow: 0 0 10px rgba(0, 240, 255, 0.7); letter-spacing: 1px;
            font-size: 2.0rem; text-align: center;
        }
        form { display: flex; width: 100%; gap: 10px; margin-bottom: 18px; }
        input[type="text"] { /* Keep existing input styles */
            flex: 1; padding: 12px 14px; border: 1.5px solid rgba(0, 240, 255, 0.2);
            background-color: rgba(11, 16, 32, 0.7); color: var(--text); border-radius: 8px;
            font-size: 1rem; transition: border 0.2s, box-shadow 0.2s; font-family: var(--mono);
        }
        input[type="text"]:focus { /* Keep existing focus styles */
            border-color: var(--accent); outline: none; box-shadow: 0 0 10px rgba(0, 240, 255, 0.3);
        }
        button[type="submit"] { /* Keep existing submit button styles */
            padding: 12px 22px; background: var(--accent); color: var(--bg); border: none;
            border-radius: 8px; font-size: 1rem; font-weight: 600; cursor: pointer;
            box-shadow: 0 2px 8px rgba(0, 240, 255, 0.1);
            transition: background 0.2s, transform 0.1s, box-shadow 0.2s;
        }
        button[type="submit"]:hover { /* Keep existing hover styles */
             background: var(--accent-2); color: var(--bg); transform: translateY(-2px) scale(1.04);
             box-shadow: 0 4px 15px rgba(0, 240, 255, 0.2);
        }
        button:disabled { /* Keep existing disabled styles */
            opacity: 0.6; cursor: not-allowed; transform: none; box-shadow: none;
        }
        .clear-btn { /* Keep existing clear button styles */
             background: transparent; color: var(--muted); border: 1px solid var(--muted);
             padding: 8px 16px; font-size: 0.9rem; margin-top: -10px; margin-bottom: 14px;
             transition: background 0.2s, color 0.2s, border-color 0.2s;
        }
        .clear-btn:hover { /* Keep existing hover styles */
            background: rgba(170, 179, 199, 0.1); border-color: var(--accent-2); color: var(--accent-2);
            transform: none; box-shadow: none;
        }
        .result { /* Keep existing result styles */
            margin-top: 10px; font-size: 1.2rem; padding-top: 18px; width: 100%;
            color: var(--text); border-top: 1px solid rgba(0, 240, 255, 0.1);
            min-height: 48px; text-align: center;
        }
        .result strong { font-size: 1.1em; }
        .result.benign strong { color: var(--ok); text-shadow: 0 0 5px rgba(110, 240, 166, 0.5); }
        .result.defacement strong { color: #ffcc00; text-shadow: 0 0 5px rgba(255, 204, 0, 0.5); }
        .result.phishing strong { color: #ff9900; text-shadow: 0 0 5px rgba(255, 153, 0, 0.5); }
        .result.malware strong { color: var(--danger); text-shadow: 0 0 5px rgba(255, 120, 138, 0.5); }
        .result span.confidence { font-size: 0.8em; color: var(--muted); display: block; margin-top: 4px;}

        @media (max-width: 500px) { /* Keep existing media query */
            body { padding-top: 60px; justify-content: flex-start; }
            .container { padding: 24px 16px 18px 16px; width: 95%; margin-top: 20px; }
            h1 { font-size: 1.5rem; }
            form { flex-direction: column; }
            button[type="submit"], .clear-btn { width: 100%; }
        }

        #tsparticles { /* Keep existing particle styles */
            position: fixed; width: 100%; height: 100%; z-index: 0; top: 0; left: 0;
        }
    </style>
</head>
<body>
    <div id="tsparticles"></div>

    <div class="nav-back">
        <a href="/">&#8592; Back to Navigator Home</a>
    </div>

    <div class="container">
        <h1>🔐 URL Threat Detector</h1>
        <form id="url-form">
            <input type="text" id="url-input" name="url" placeholder="Enter URL..." required />
            <button type="submit" id="analyze-button">Analyze</button>
        </form>
        <button class="clear-btn" id="clear-button">Clear</button>
        <div class="result" id="result-area">
             Enter a URL to analyze its potential threat level.
        </div>
    </div>

    <script>
        // Keep existing form handling script
        const form = document.getElementById('url-form');
        const urlInput = document.getElementById('url-input');
        const resultArea = document.getElementById('result-area');
        const analyzeButton = document.getElementById('analyze-button');
        const clearButton = document.getElementById('clear-button');
        // ... (rest of the script remains the same) ...
         form.addEventListener('submit', async (e) => {
            e.preventDefault(); const url = urlInput.value.trim(); if (!url) return;
            resultArea.textContent = 'Analyzing...'; resultArea.className = 'result'; analyzeButton.disabled = true;
            try {
                const response = await fetch('/analyze-url', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ url: url }) });
                const data = await response.json(); if (!response.ok) throw new Error(data.error || `HTTP error! status: ${response.status}`);
                let resultClass = 'result';
                if (data.prediction.includes('Benign')) resultClass += ' benign'; else if (data.prediction.includes('Defacement')) resultClass += ' defacement'; else if (data.prediction.includes('Phishing')) resultClass += ' phishing'; else if (data.prediction.includes('Malware')) resultClass += ' malware';
                resultArea.className = resultClass;
                resultArea.innerHTML = `Prediction: <strong>${data.prediction}</strong><span class="confidence">Confidence: ${data.confidence}%</span>`;
            } catch (error) { console.error('Analysis failed:', error); resultArea.className = 'result malware'; resultArea.innerHTML = `<strong>Error:</strong> ${error.message}`; } finally { analyzeButton.disabled = false; }
        });
        clearButton.addEventListener('click', () => { urlInput.value = ''; resultArea.textContent = 'Enter a URL to analyze its potential threat level.'; resultArea.className = 'result'; urlInput.focus(); });
    </script>

    <script src="https://cdn.jsdelivr.net/npm/tsparticles@2.11.1/tsparticles.bundle.min.js"></script>
    <script>
      // Keep existing particle script
      tsParticles.load("tsparticles", {
        fullScreen: { enable: true, zIndex: 0 }, background: { color: { value: "#05080f" } },
        particles: { number: { value: 100, density: { enable: true, area: 800 } }, color: { value: "#00f0ff" }, shape: { type: "circle" }, opacity: { value: 0.4 }, size: { value: { min: 2, max: 4 } }, move: { enable: true, speed: 2, direction: "none", outModes: { default: "bounce" }, random: true, straight: false }, links: { enable: true, distance: 120, color: "#00f0ff", opacity: 0.3, width: 1 } },
        interactivity: { detectsOn: "window", events: { onHover: { enable: true, mode: "grab" }, onClick: { enable: false } }, modes: { grab: { distance: 140, links: { opacity: 0.5 } } } },
        detectRetina: true
      });
    </script>
</body>
</html>
