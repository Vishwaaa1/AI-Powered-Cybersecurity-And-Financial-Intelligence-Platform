<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CyberNest | Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script>
        if (localStorage.getItem('theme') === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
        } else {
            document.documentElement.classList.remove('dark');
        }
    </script>
</head>
<body class="bg-gray-100 dark:bg-gray-900 dark:text-gray-200 font-sans transition-colors duration-300">
    <div class="flex min-h-screen">
        <aside class="w-60 bg-white dark:bg-gray-800 shadow-md p-6 flex-shrink-0">
            <h1 class="text-2xl font-bold text-blue-700 dark:text-blue-400 mb-8">CyberNest</h1>
            <nav class="space-y-4">
                <a href="/dashboard" class="block font-semibold text-blue-700 dark:text-blue-400">Dashboard</a>
                <a href="/budgets" class="block text-gray-700 dark:text-gray-300 hover:text-blue-500 dark:hover:text-blue-400">Budgets</a>
                <a href="/assistant" class="block text-gray-700 dark:text-gray-300 hover:text-blue-500 dark:hover:text-blue-400">AI Advisor</a>
                <a href="/memory" class="block text-gray-700 dark:text-gray-300 hover:text-blue-500 dark:hover:text-blue-400">Vendor Memory</a>
                <a href="/learn" class="block text-gray-700 dark:text-gray-300 hover:text-blue-500 dark:hover:text-blue-400">Learn</a>
                <a href="/settings" class="block text-gray-700 dark:text-gray-300 hover:text-blue-500 dark:hover:text-blue-400">Settings</a>
                <a href="/bill-splitter" class="block text-gray-700 dark:text-gray-300 hover:text-blue-500 dark:hover:text-blue-400">Bill Splitter</a>
                <a href="/" class="block text-gray-700 dark:text-gray-300 hover:text-blue-500 dark:hover:text-blue-400">Navigator Home</a>
            </nav>
        </aside>

        <main class="flex-1 p-8 overflow-y-auto">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-2xl font-semibold dark:text-white">Dashboard</h2>
                <form id="upload-form" class="flex gap-2">
                    <input type="file" id="fileInput" accept=".csv,.pdf" class="border dark:border-gray-600 p-2 rounded dark:bg-gray-700 dark:text-gray-300 focus:outline-none focus:ring-2 focus:ring-blue-500">
                    <button type="submit" class="bg-blue-600 text-white px-4 py-2 rounded hover:bg-blue-700 transition-colors">Upload Statement</button>
                </form>
            </div>

            <div id="results">
                <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4 mb-8">
                    <div class="bg-white dark:bg-gray-800 dark:border dark:border-gray-700 shadow rounded p-4 transition-colors duration-300">
                        <div class="text-sm text-gray-500 dark:text-gray-400">Current Balance</div>
                        <div id="current-balance" class="text-xl font-bold dark:text-white">₹0.00</div>
                    </div>
                    <div class="bg-white dark:bg-gray-800 dark:border dark:border-gray-700 shadow rounded p-4 transition-colors duration-300">
                        <div class="text-sm text-gray-500 dark:text-gray-400">Starting Balance (Period)</div>
                        <div id="starting-balance" class="text-xl font-bold dark:text-white">₹0.00</div>
                    </div>
                    <div class="bg-white dark:bg-gray-800 dark:border dark:border-gray-700 shadow rounded p-4 transition-colors duration-300">
                        <div class="text-sm text-gray-500 dark:text-gray-400">Total Expenses (Period)</div>
                        <div id="total-expense" class="text-xl font-bold text-red-600">₹0.00</div>
                    </div>
                    <div class="bg-white dark:bg-gray-800 dark:border dark:border-gray-700 shadow rounded p-4 transition-colors duration-300">
                        <div class="text-sm text-gray-500 dark:text-gray-400">Total Income (Period)</div>
                        <div id="total-income" class="text-xl font-bold text-green-600">₹0.00</div>
                    </div>
                </div>

                <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
                    <div class="lg:col-span-2 bg-white dark:bg-gray-800 dark:border dark:border-gray-700 p-4 shadow rounded transition-colors duration-300">
                        <h3 class="font-semibold mb-4 dark:text-white">Expense Breakdown</h3>
                        <div class="relative h-64 md:h-80 lg:h-96">
                             <canvas id="expenseChart"></canvas>
                        </div>
                    </div>
                    <div class="bg-white dark:bg-gray-800 dark:border dark:border-gray-700 p-4 shadow rounded flex flex-col h-[400px] lg:h-auto lg:max-h-[500px] transition-colors duration-300">
                        <h3 class="font-semibold mb-4 dark:text-white">Recent Transactions</h3>
                        <div id="recent-transactions" class="text-sm space-y-3 overflow-y-auto pr-2 dark:text-gray-300 flex-grow">
                           </div>
                    </div>
                </div>
            </div>

            <div id="learn-section" class="mt-10 hidden">
                <h3 class="text-lg font-semibold mb-4 dark:text-white">🧠 Help Us Categorize These</h3>
                <div class="overflow-x-auto w-full bg-gray-200 dark:bg-gray-700 p-4 rounded-lg">
                    <div id="unknown-vendors" class="flex flex-nowrap gap-4">
                        </div>
                </div>
            </div>
        </main>
    </div>

    <script src="/scripts/dashboard.js"></script>
    </body>
</html>
